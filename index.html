<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #888; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #2ecc71; color: white; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:active { background: #27ae60; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #2ecc71;">德州撲克手牌紀錄</h2>
    
    <div class="form-group">
        <label>玩家名稱 (Opponent)</label>
        <input type="text" id="player_name" placeholder="例如: Maniac, Reg, 黃至正">
    </div>

    <div class="form-group">
        <label>位置 (Position)</label>
        <select id="position">
            <option value="BTN">BTN (按鈕)</option>
            <option value="SB">SB (小盲)</option>
            <option value="BB">BB (大盲)</option>
            <option value="UTG">UTG (槍口)</option>
            <option value="MP">MP (中位)</option>
            <option value="CO">CO (關位)</option>
        </select>
    </div>

    <div class="form-group">
        <label>動作 (Action)</label>
        <select id="action">
            <option value="RFI">RFI (率先加注)</option>
            <option value="3-Bet">3-Bet</option>
            <option value="4-Bet+">4-Bet+</option>
            <option value="Call">Call (跟注)</option>
            <option value="Check-Raise">Check-Raise</option>
            <option value="Bluff-Catcher">Bluff-Catch</option>
        </select>
    </div>

    <div class="form-group">
        <label>手牌 (Hand)</label>
        <input type="text" id="hand" placeholder="例如: AA, A5s, 72o">
    </div>

    <button onclick="saveData()">紀錄數據</button>

    <script>
        async function saveData() {
            const data = {
                player_name: document.getElementById('player_name').value,
                position: document.getElementById('position').value,
                action: document.getElementById('action').value,
                hand: document.getElementById('hand').value
            };

            // 檢查必填
            if (!data.player_name || !data.hand) {
                alert("請填寫玩家名稱與手牌");
                return;
            }

            const apiUrl = '你的_GOOGLE_APPS_SCRIPT_網址'; // <--- 請務必換成你的 URL

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    mode: 'no-cors', // 解決跨網域問題
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("紀錄成功！數據已同步至 Sheets");
                // 成功後清空部分欄位方便下一筆輸入
                document.getElementById('hand').value = '';
            } catch (error) {
                alert("發生錯誤，請檢查網址或網路");
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
