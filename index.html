<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #888; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* 花色按鈕樣式 */
        .suit-container { display: flex; gap: 10px; margin-top: 8px; }
        .suit-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; color: white; }
        .suit-spade { background: #333; }   /* 黑桃 */
        .suit-heart { background: #e74c3c; } /* 愛心 */
        .suit-diamond { background: #3498db; } /* 方塊 (藍) */
        .suit-club { background: #27ae60; }   /* 梅花 */

        button#submit-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #2ecc71; color: white; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        button#submit-btn:active { background: #1f8e4c; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #2ecc71;">德州撲克手牌紀錄</h2>
    
    <div class="form-group">
        <label>玩家編號 (Seat Number)</label>
        <select id="player_name">
            <option value="1">1 號位</option>
            <option value="2">2 號位</option>
            <option value="3">3 號位</option>
            <option value="4">4 號位</option>
            <option value="5">5 號位</option>
            <option value="6">6 號位</option>
            <option value="7">7 號位</option>
            <option value="8">8 號位</option>
            <option value="9">9 號位</option>
        </select>
    </div>

    <div class="form-group">
        <label>位置 (Position)</label>
        <select id="position">
            <option value="BTN">BTN (按鈕)</option>
            <option value="SB">SB (小盲)</option>
            <option value="BB">BB (大盲)</option>
            <option value="UTG">UTG (槍口)</option>
            <option value="UTG+1">UTG+1</option>
            <option value="UTG+2">UTG+2</option>
            <option value="UTG+3">UTG+3</option>
            <option value="MP">MP (中位)</option>
            <option value="CO">CO (關位)</option>
        </select>
    </div>

    <div class="form-group">
        <label>動作 (Action)</label>
        <select id="action">
            <option value="RFI">OPEN (率先加注)</option>
            <option value="3-Bet">3-Bet</option>
            <option value="4-Bet+">4-Bet+</option>
            <option value="Call">Call (跟注)</option>
            <option value="Check-Raise">Check-Raise</option>
            <option value="Bluff-Catcher">Bluff-Catch</option>
        </select>
    </div>

    <div class="form-group">
        <label>手牌 (Hand)</label>
        <input type="text" id="hand" placeholder="例如: AhKh, 72o">
        <div class="suit-container">
            <button class="suit-btn suit-spade" onclick="addSuit('s')">♠</button>
            <button class="suit-btn suit-heart" onclick="addSuit('h')">♥</button>
            <button class="suit-btn suit-diamond" onclick="addSuit('d')">♦</button>
            <button class="suit-btn suit-club" onclick="addSuit('c')">♣</button>
        </div>
    </div>

    <button id="submit-btn" onclick="saveData()">紀錄數據</button>

    <script>
        // 插入花色符號的函式
        function addSuit(symbol) {
            const handInput = document.getElementById('hand');
            handInput.value += symbol;
            handInput.focus(); // 點擊後保持焦點在輸入框，方便繼續打字
        }

        async function saveData() {
            const data = {
                player_name: document.getElementById('player_name').value,
                position: document.getElementById('position').value,
                action: document.getElementById('action').value,
                hand: document.getElementById('hand').value
            };

            if (!data.hand) {
                alert("請填寫手牌");
                return;
            }

            const apiUrl = 'https://script.google.com/macros/s/AKfycbyWKRG3iu5AUq3xve0NgnZ_tHSiXwXmmz-UcP8MhZuuZVPgzDgpIqHKqHOCfG-zxAGJ/exec'; 

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("紀錄成功！數據已同步至 Sheets");
                document.getElementById('hand').value = '';
            } catch (error) {
                alert("發生錯誤，請檢查網址或網路");
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
